spring.application.name=backend-dash
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${SUPABASE_DB_URL:}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preferQueryMode=simple
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:local-development-secret-change-before-production}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:*}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
