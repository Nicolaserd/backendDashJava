services:
  db:
    image: postgres:16
    container_name: backend-dash-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: backenddash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d backenddash"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-dash-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_URL: jdbc:postgresql://db:5432/backenddash
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_SECONDS: 86400
      JPA_DDL_AUTO: update
      CORS_ALLOWED_ORIGIN_PATTERNS: "*"
      JAVA_OPTS: -XX:MaxRAMPercentage=75.0
    ports:
      - "8080:8080"

volumes:
  postgres_data:
