services:
  - type: web
    name: java-backend-dash
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /v3/api-docs
    envVars:
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_DB_USER
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_SECONDS
        value: "86400"
      - key: JPA_DDL_AUTO
        value: "update"
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: "*"
